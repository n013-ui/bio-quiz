<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>生物錯題練習</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    background: #f0f4f8; color: #1a1a2e; min-height: 100vh;
  }
  #app { max-width: 800px; margin: 0 auto; padding: 16px; }

  /* ── Screens ── */
  .screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 80vh; text-align: center; padding: 32px 16px;
  }
  .screen h1 { font-size: 1.9rem; margin-bottom: 12px; color: #2d6a4f; }
  .screen p  { font-size: 1.05rem; color: #555; margin-bottom: 24px; line-height: 1.7; }
  .badge {
    background: #2d6a4f; color: white; border-radius: 50%;
    width: 96px; height: 96px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem; margin-bottom: 24px;
  }

  /* ── Progress ── */
  #progress-wrap {
    background: #dde; border-radius: 999px; height: 10px;
    margin-bottom: 6px; overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #52b788, #2d6a4f);
    border-radius: 999px; transition: width .4s ease;
  }
  #progress-label { font-size: 0.82rem; color: #666; margin-bottom: 14px; }
  #round-badge { text-align: center; font-size: 0.82rem; color: #888; margin-bottom: 7px; }

  /* ── Card ── */
  #card {
    background: white; border-radius: 20px; padding: 22px 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08); margin-bottom: 14px;
  }
  #section-tag {
    display: inline-block; background: #d8f3dc; color: #2d6a4f;
    font-size: 0.78rem; padding: 3px 12px; border-radius: 999px;
    margin-bottom: 10px; font-weight: 700;
  }
  #group-context {
    background: #f8f9fa; border-left: 4px solid #52b788;
    padding: 10px 14px; margin-bottom: 14px; border-radius: 0 8px 8px 0;
    font-size: 0.93rem; line-height: 1.75;
  }
  #group-context img { max-width: 100%; border-radius: 6px; margin: 6px 0; display: block; }
  #question-stem { font-size: 1.03rem; line-height: 1.85; margin-bottom: 18px; }
  #question-stem img { max-width: 100%; border-radius: 8px; margin: 8px 0; display: block; }

  /* ── Options ── */
  #options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: flex-start; gap: 10px;
    background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 12px;
    padding: 13px 14px; font-size: 0.98rem; cursor: pointer;
    text-align: left; transition: all .18s; width: 100%; line-height: 1.6;
  }
  .opt-btn .lbl {
    background: #e0e0e0; color: #555; border-radius: 7px;
    min-width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.88rem; flex-shrink: 0; transition: all .18s;
  }
  .opt-btn.selected   { border-color: #457b9d; background: #dbeafe; }
  .opt-btn.selected .lbl { background: #457b9d; color: white; }
  .opt-btn.correct    { border-color: #2d6a4f; background: #d8f3dc; }
  .opt-btn.correct .lbl { background: #2d6a4f; color: white; }
  .opt-btn.wrong      { border-color: #e63946; background: #ffe0e3; }
  .opt-btn.wrong .lbl { background: #e63946; color: white; }
  .opt-btn.reveal     { border-color: #2d6a4f; background: #d8f3dc; }
  .opt-btn.reveal .lbl { background: #2d6a4f; color: white; }

  /* 圖片選項模式 */
  #img-opt-display { margin-bottom: 14px; line-height: 1.8; font-size: 0.98rem; }
  #img-opt-display img { max-width: 100%; border-radius: 6px; margin: 6px 0; display: block; }
  .abcd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .abcd-btn {
    padding: 16px; font-size: 1.15rem; font-weight: 700;
    background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 12px;
    cursor: pointer; transition: all .18s;
  }
  .abcd-btn.selected  { border-color: #457b9d; background: #dbeafe; color: #1d3557; }
  .abcd-btn.correct   { border-color: #2d6a4f; background: #d8f3dc; color: #2d6a4f; }
  .abcd-btn.wrong     { border-color: #e63946; background: #ffe0e3; color: #e63946; }
  .abcd-btn.reveal    { border-color: #2d6a4f; background: #d8f3dc; color: #2d6a4f; }

  /* ── Confirm button ── */
  #confirm-btn {
    width: 100%; padding: 17px; font-size: 1.05rem; font-weight: 700;
    background: #457b9d; color: white; border: none; border-radius: 14px;
    cursor: pointer; display: none; margin-top: 12px; transition: background .2s;
  }
  #confirm-btn:active { background: #1d3557; }

  /* ── Feedback ── */
  #feedback {
    border-radius: 12px; padding: 13px 16px; margin-top: 12px;
    font-size: 1rem; font-weight: 600; display: none;
  }
  #feedback.ok  { background: #d8f3dc; color: #1b4332; }
  #feedback.err { background: #ffe0e3; color: #9b2226; }

  /* ── Next button ── */
  #next-btn {
    width: 100%; padding: 17px; font-size: 1.05rem; font-weight: 700;
    background: #2d6a4f; color: white; border: none; border-radius: 14px;
    cursor: pointer; display: none; margin-top: 12px; transition: background .2s;
  }
  #next-btn:active { background: #1b4332; }

  /* ── Shared button styles ── */
  .big-btn {
    padding: 17px 38px; font-size: 1.05rem; font-weight: 700;
    background: #2d6a4f; color: white; border: none;
    border-radius: 14px; cursor: pointer; transition: background .2s;
  }
  .big-btn:active { background: #1b4332; }
  .big-btn.sec {
    background: white; color: #2d6a4f; border: 2px solid #2d6a4f;
  }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn-col { display: flex; flex-direction: column; gap: 10px; align-items: center; width: 100%; max-width: 320px; }
  .btn-col .big-btn { width: 100%; }

  /* ── Stats ── */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin: 20px 0; width: 100%; max-width: 300px;
  }
  .stat-box {
    background: white; border-radius: 16px; padding: 16px;
    text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .stat-box .num { font-size: 1.9rem; font-weight: 900; color: #2d6a4f; }
  .stat-box .lbl { font-size: 0.78rem; color: #888; margin-top: 3px; }

  .hidden { display: none !important; }

  /* ── Save button (fixed top-right) ── */
  #save-btn {
    position: fixed; top: 14px; right: 14px; z-index: 200;
    background: #2d6a4f; color: white; border: none; border-radius: 10px;
    padding: 9px 16px; font-size: 0.88rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.25);
    transition: background .15s;
  }
  #save-btn:active { background: #1b4332; }
  #save-btn.saved  { background: #27ae60; }

  /* ── Guessed button ── */
  #guessed-btn {
    width: 100%; padding: 11px 14px; font-size: 0.9rem; font-weight: 600;
    background: white; color: #d97706; border: 2px solid #fbbf24;
    border-radius: 12px; cursor: pointer; display: none; margin-top: 8px;
    transition: all .18s; text-align: left;
  }
  #guessed-btn.marked { color: #9ca3af; border-color: #d1d5db; cursor: default; }
</style>
</head>
<body>
<button id="save-btn" class="hidden" onclick="saveProgress()">💾 暫存進度</button>
<div id="app">

  <!-- ─── 開始畫面 ─── -->
  <div id="start-screen" class="screen">
    <div class="badge">📚</div>
    <h1>生物錯題練習</h1>
    <p>共 <strong id="total-count"></strong> 題<br>
       答錯的題目會自動回收，直到全部答對為止</p>
    <div class="btn-col" style="margin-top:4px;">
      <button class="big-btn" onclick="startQuiz()">開始練習</button>
      <button id="restore-btn" class="big-btn sec hidden" onclick="restoreProgress()">↩ 繼續上次進度</button>
    </div>
  </div>

  <!-- ─── 答題畫面 ─── -->
  <div id="quiz-screen" class="hidden">
    <div id="round-badge"></div>
    <div id="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>
    <div id="progress-label"></div>
    <div id="card">
      <div id="section-tag"></div>
      <div id="group-context" class="hidden"></div>
      <div id="question-stem"></div>
      <div id="options"></div>
    </div>
    <button id="confirm-btn" onclick="confirmAnswer()">確認送出</button>
    <div id="feedback"></div>
    <button id="guessed-btn" onclick="markAsGuessed()">🎲 我是用猜的，加入回收</button>
    <button id="next-btn" onclick="nextQuestion()">下一題 →</button>
  </div>

  <!-- ─── 每輪結束畫面 ─── -->
  <div id="round-end-screen" class="screen hidden">
    <div class="badge" id="re-emoji">📝</div>
    <h1 id="re-title">第一輪完成</h1>
    <p id="re-desc"></p>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="num" id="re-total"></div>
        <div class="lbl">本輪題數</div>
      </div>
      <div class="stat-box">
        <div class="num" id="re-correct" style="color:#2d6a4f;"></div>
        <div class="lbl">答對</div>
      </div>
      <div class="stat-box">
        <div class="num" id="re-wrong" style="color:#e63946;"></div>
        <div id="re-wrong-lbl" class="lbl">答錯（回收）</div>
      </div>
      <div class="stat-box">
        <div class="num" id="re-rounds"></div>
        <div class="lbl">目前輪數</div>
      </div>
    </div>
    <div class="btn-col">
      <button class="big-btn" id="re-next-btn" onclick="startNextRound()">開始第二輪</button>
      <button class="big-btn sec" id="re-export-btn" onclick="exportRoundPDF()">📥 儲存本輪錯題</button>
      <button class="big-btn sec" id="re-restart-btn" onclick="restartQuiz()" style="border-color:#aaa;color:#888;">全部重練</button>
    </div>
  </div>

</div>

ull, "sub_n": null, "answer": "D", "id": 8}, {"section": "【生物 4-1】", "type": "mc", "group_context": "", "stem": "下列哪一個地區不屬於一般定義地球生物圈的範圍？", "opts": {"A": "火山口附近", "B": "北極大陸", "C": "空氣稀薄的高山", "D": "距離地表約25公里高的臭氧層。"}, "full_html": "下列哪一個地區不屬於一般定義地球生物圈的範圍？　(A)火山口附近　(B)北極大陸　(C)空氣稀薄的高山　(D)距離地表約25公里高的臭氧層。", "grp_n": null, "sub_n": null, "answer": "D", "id": 9}, {"section": "【生物 4-1】", "type": "mc", "group_context": "", "stem": "關於地表生物分布的敘述，下列何者錯誤？", "opts": {"A": "高溫的地底溫泉中仍有一些生物生存", "B": "喜馬拉雅山山頂標高8848公尺，超出了生物圈的範圍", "C": "深海中沒有綠色植物，是因為缺乏陽光的緣故", "D": "寒冷的南北極仍有不少生物生存。"}, "full_html": "關於地表生物分布的敘述，下列何者錯誤？　(A)高溫的地底溫泉中仍有一些生物生存　(B)喜馬拉雅山山頂標高8848公尺，超出了生物圈的範圍　(C)深海中沒有綠色植物，是因為缺乏陽光的緣故　(D)寒冷的南北極仍有不少生物生存。", "grp_n": null, "sub_n": null, "answer": "B", "id": 10}, {"section": "【生物 4-1】", "type": "mc", "group_context": "", "stem": "若科學家在海平面11公里下的岩層發現到數種細菌生存於此，則生物圈的範圍會如何變化？", "opts": {"A": "增加1公里", "B": "增加11公里", "C": "減少1公里", "D": "減少11公里。"}, "full_html": "若科學家在海平面11公里下的岩層發現到數種細菌生存於此，則生物圈的範圍會如何變化？　(A)增加1公里　(B)增加11公里　(C)減少1公里　(D)減少11公里。", "grp_n": null, "sub_n": null, "answer": "A", "id": 11}, {"section": "【生物 4-1】", "type": "mc", "group_context": "", "stem": "關於生物圈的敘述，何者正確？", "opts": {"A": "為海平面垂直上下共一萬公尺的範圍內", "B": "生物圈內的環境都差不多，因此可以孕育出豐富的生命", "C": "為了適應不同的生存環境，生物通常有著不同的外觀、構造與習性", "D": "生物圈的範圍含有水圈及大氣圈，但不包含岩石圈。"}, "full_html": "關於生物圈的敘述，何者正確？　(A)為海平面垂直上下共一萬公尺的範圍內　(B)生物圈內的環境都差不多，因此可以孕育出豐富的生命　(C)為了適應不同的生存環境，生物通常有著不同的外觀、構造與習性　(D)生物圈的範圍含有水圈及大氣圈，但不包含岩石圈。", "grp_n": null, "sub_n": null, "answer": "C", "id": 12}, {"section": "【生物 4-1】", "type": "mc", "group_context": "", "stem": "下列敘述何者是我們決定生物圈範圍的依據？", "opts": {"A": "現今人類生存的範圍", "B": "現今地球有生物活動的範圍", "C": "自古至今地球有生物活動的範圍", "D": "現今有動物活動的範圍。"}, "full_html": "下列敘述何者是我們決定生物圈範圍的依據？　(A)現今人類生存的範圍　(B)現今地球有生物活動的範圍　(C)自古至今地球有生物活動的範圍　(D)現今有動物活動的範圍。", "grp_n": null, "sub_n": null, "answer": "B", "id": 13}, {"section": "【生物 4-1】", "type": "mc", "group_context": "", "stem": "人類在西元1969年第一次登陸月球，地球距離月球約384,400公里，所以現今生物圈的範圍為下列何者？", "opts": {"A": "10公里", "B": "20公里 物繁衍", "D": "外來種植物可增加本地的生物種類。"}, "full_html": "約西元1950年代，有人引進「小花蔓澤蘭」這種植物來綠化環境，今日這種植物已經在臺灣中南部地區造成許多原生植物死亡，甚至危害農作物，因此有「綠色癌症」之稱。關於此現象，下列敘述何者正確？　\n(A)這是育種的結果，應讓其自然演化　\n(B)不當引入外來生物，破壞了原本的生態平衡　\n(C)應引入小花蔓澤蘭的天敵，以控制此植物繁衍　\n(D)外來種植物可增加本地的生物種類。", "grp_n": null, "sub_n": null, "answer": "B", "id": 44}, {"section": "【課次卷 5-1】", "type": "mc", "group_context": "", "stem": "在環境議題討論課上，學生整理了幾種常見的汙染現象與其影響。若要從中指出與科學事實不符的描述，下列哪一項最適合？", "opts": {"A": "食用種植於受到汙染的土壤上之農作物，對人體影響不大", "B": "發生優養化的水域，水中魚蝦會因缺氧而死亡", "C": "露天燃燒廢電纜產生的廢氣，會經呼吸系統進入人體並累積", "D": "空氣中的二氧化硫溶於雨水中形成酸雨，會影響植物的生長。"}, "full_html": "在環境議題討論課上，學生整理了幾種常見的汙染現象與其影響。若要從中指出與科學事實不符的描述，下列哪一項最適合？\n(A)食用種植於受到汙染的土壤上之農作物，對人體影響不大\n(B)發生優養化的水域，水中魚蝦會因缺氧而死亡\n(C)露天燃燒廢電纜產生的廢氣，會經呼吸系統進入人體並累積\n(D)空氣中的二氧化硫溶於雨水中形成酸雨，會影響植物的生長。", "grp_n": null, "sub_n": null, "answer": "A", "id": 45}, {"section": "【課次卷 5-1】", "type": "mc", "group_context": "", "stem": "原產於中南美洲的綠鬣蜥，在臺灣因人為棄養與野放，已在野外形成大量族群，對臺灣的生態環境造成了嚴重的危害，包含：破壞植被、與原生物種競爭、造成農作物損失，綠鬣蜥的挖土習性也會損壞河堤基礎設施、引發電線短路停電與道路塌陷、影響農業與觀光業經濟，並可能帶來病菌傳播威脅。請問上述情形是典型的什麼因素造成生物多樣性的危害？", "opts": {"A": "過度開發利用", "B": "棲地破壞", "C": "環境汙染", "D": "外來物種。"}, "full_html": "原產於中南美洲的綠鬣蜥，在臺灣因人為棄養與野放，已在野外形成大量族群，對臺灣的生態環境造成了嚴重的危害，包含：破壞植被、與原生物種競爭、造成農作物損失，綠鬣蜥的挖土習性也會損壞河堤基礎設施、引發電線短路停電與道路塌陷、影響農業與觀光業經濟，並可能帶來病菌傳播威脅。請問上述情形是典型的什麼因素造成生物多樣性的危害？\n(A)過度開發利用(B)棲地破壞\n(C)環境汙染(D)外來物種。", "grp_n": null, "sub_n": null, "answer": "B", "id": 46}, {"section": "【課次卷 5-1】", "type": "group", "group_context": "請根據附圖的臺灣人口成長曲線圖，回答下列問題：", "stem": "從民國9年到89年，臺灣人口約成長多少人？", "opts": {"A": "500萬", "B": "800萬", "C": "2000萬", "D": "2500萬。"}, "full_html": "從民國9年到89年，臺灣人口約成長多少人？　\n(A)500萬(B)800萬　\n(C)2000萬(D)2500萬。", "grp_n": 1, "sub_n": 1, "answer": "C", "id": 47}, {"section": "【課次卷 5-1】", "type": "group", "group_context": "花蓮鯉魚潭曾因為嚴重優養化問題，出現大量紅藻淤積的現象。鯉魚潭有將近三分之一的面積出現紅藻，如果要澈底解決，就必須改善生活汙水處理並清除淤積的汙泥。目前只能先請船家用抽水馬達，把越來越多的紅藻撈掉。\n優養化是一種自然現象，水裡的養分隨著時間變多，水越來越淺，而變成沼澤地。都市中家庭廢水、抽水馬桶排放的汙水與合成肥料等，都含有相當高的磷化物和硝酸鹽類，這些皆是水質優養化的罪魁禍首，優養化會使藻類大量繁殖，消耗氧氣以致生物死亡。請根據所提供的資料，回答下列問題：", "stem": "下列何者不是直接誘發河川優養化的物質？", "opts": {"A": "養分", "B": "磷化物", "C": "硝酸鹽類", "D": "氧氣。"}, "full_html": "下列何者不是直接誘發河川優養化的物質？　\n(A)養分　(B)磷化物　(C)硝酸鹽類　(D)氧氣。", "grp_n": 2, "sub_n": 2, "answer": "D", "id": 48}, {"section": "【課次卷 5-1】", "type": "group", "group_context": "福壽螺原產於南美洲，西元1980年被引入臺灣作為食用螺飼養，但因肉質不佳而被業者大量棄置於排水溝、灌溉水道中，造成福壽螺在野外大量繁殖，並對農作物造成嚴重的危害。請回答下列問題：", "stem": "若要對福壽螺進行防治，則下列何種方法較有效率且對生態環境的影響最小？", "opts": {"A": "從國外引進福壽螺的天敵", "B": "以人工方式摘除福壽螺產下的螺卵", "C": "在排水溝、灌溉水道中噴灑殺蟲劑", "D": "放養鴨子，讓其捕食福壽螺與螺卵。"}, "full_html": "若要對福壽螺進行防治，則下列何種方法較有效率且對生態環境的影響最小？　\n(A)從國外引進福壽螺的天敵　\n(B)以人工方式摘除福壽螺產下的螺卵　\n(C)在排水溝、灌溉水道中噴灑殺蟲劑　\n(D)放養鴨子，讓其捕食福壽螺與螺卵。", "grp_n": 3, "sub_n": 2, "answer": "D", "id": 49}, {"section": "【課次卷 5-2】", "type": "mc", "group_context": "", "stem": "\n(   )下列哪一措施，對減少垃圾量最有幫助？", "opts": {"A": "開闢垃圾掩埋場", "B": "減少使用塑膠製品", "C": "建造焚化爐", "D": "減少垃圾產生。"}, "full_html": "\n(   )下列哪一措施，對減少垃圾量最有幫助？　\n(A)開闢垃圾掩埋場　\n(B)減少使用塑膠製品　\n(C)建造焚化爐　\n(D)減少垃圾產生。", "grp_n": null, "sub_n": null, "answer": "D", "id": 50}, {"section": "【課次卷 5-2】", "type": "mc", "group_context": "", "stem": "有關國際間為了維護地球的環境與生物所成立的會議、組織和公約，下列何者配對錯誤？", "opts": {}, "full_html": "有關國際間為了維護地球的環境與生物所成立的會議、組織和公約，下列何者配對錯誤？　\n(A)拉姆薩公約─溼地的保育　\n(B)生物多樣性公約─維護全球生物的多樣性　\n(C)華盛頓公約─管制野生動、植物的貿易　", "grp_n": null, "sub_n": null, "answer": "D", "id": 51}, {"section": "【課次卷 5-2】", "type": "group", "group_context": "春仔趁週末到臺南七股賞鳥，七股位於曾文溪出海口，屬於河口生態系，其生產者有富盛名的紅樹林植物，包含了海茄苳、五梨跤、欖李三種。春仔在那兒度過了一段美好的午後時光，看見小白鷺在黑面琵鷺旁撿便宜，捕食全不費工夫；紅腳的高蹺鴴、綠腿的青足鷸在同一片泥地裡覓食，還有小環頸鴴到處跑來跑去。看大家都那麼忙碌，春仔於是到泥灘上探探究竟。有清白招潮蟹、北方招潮蟹賣力跟他們招手，而裝石頭的和尚蟹也很可愛，還有彈塗魚、槍蝦都新鮮有趣。臨別前，春仔大嘆真該設立自然保留區，要不然這片美麗消失了就不好了。請回答下列問題：", "stem": "五梨跤與水筆仔同為紅樹科植物，以胎生苗繁衍，試問下列敘述何者正確？", "opts": {"A": "種子先在母樹上發芽，然後落在泥土中生長", "B": "果實隨海水漂流，被沖到岸上才能發芽生長", "C": "種子要落在鹽分高的海水中，才能發芽生長", "D": "不會開花結果，需靠人類為它們插枝繁殖。"}, "full_html": "五梨跤與水筆仔同為紅樹科植物，以胎生苗繁衍，試問下列敘述何者正確？　\n(A)種子先在母樹上發芽，然後落在泥土中生長　(B)果實隨海水漂流，被沖到岸上才能發芽生長　(C)種子要落在鹽分高的海水中，才能發芽生長　(D)不會開花結果，需靠人類為它們插枝繁殖。", "grp_n": 1, "sub_n": 2, "answer": "A", "id": 52}];

// Per-round state
let queue=[], cur=0, round=1;
let roundWrongIds=new Set();   // wrong in current round
let roundGuessedIds=new Set(); // guessed correct in current round
let roundWrongAns={};          // {id: chosenAnswer} for current round
let roundTotal=0;              // question count in current round

// Session state (across all rounds)
let sessionWrongIds=new Set();
let sessionWrongAns={};
let correct1=0, totalWrong=0;

// UI state
let answered=false;
let selectedOptKey=null;       // selected but not yet confirmed

document.getElementById('total-count').textContent = QUESTIONS.length;

const SAVE_KEY = 'bio_quiz_v1';

function saveProgress() {
  const state = {
    queue, cur, round,
    roundWrongIds: [...roundWrongIds],
    roundGuessedIds: [...roundGuessedIds],
    roundWrongAns,
    sessionWrongIds: [...sessionWrongIds],
    sessionWrongAns,
    correct1, totalWrong,
    ts: Date.now()
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  const btn = document.getElementById('save-btn');
  btn.textContent = '✅ 已暫存';
  btn.classList.add('saved');
  setTimeout(() => {
    btn.textContent = '💾 暫存進度';
    btn.classList.remove('saved');
  }, 1800);
}

function loadSaved() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); }
  catch(e) { return null; }
}

function restoreProgress() {
  const s = loadSaved();
  if (!s) return;
  queue = s.queue; cur = s.cur; round = s.round;
  roundWrongIds = new Set(s.roundWrongIds);
  roundGuessedIds = new Set(s.roundGuessedIds || []);
  roundWrongAns = s.roundWrongAns;
  sessionWrongIds = new Set(s.sessionWrongIds);
  sessionWrongAns = s.sessionWrongAns;
  correct1 = s.correct1; totalWrong = s.totalWrong;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('save-btn').classList.remove('hidden');
  showQ();
}

window.addEventListener('load', () => {
  const s = loadSaved();
  if (!s) return;
  const d = new Date(s.ts);
  const ts = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const btn = document.getElementById('restore-btn');
  btn.textContent = `↩ 繼續上次進度（${ts}）`;
  btn.classList.remove('hidden');
});

function startQuiz(){
  localStorage.removeItem(SAVE_KEY);
  document.getElementById('restore-btn').classList.add('hidden');
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('save-btn').classList.remove('hidden');
  queue = QUESTIONS.map((_,i)=>i);
  shuffle(queue);
  round=1; roundTotal=queue.length;
  roundWrongIds=new Set(); roundGuessedIds=new Set(); roundWrongAns={};
  sessionWrongIds=new Set(); sessionWrongAns={};
  correct1=0; totalWrong=0; cur=0;
  showQ();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function showQ(){
  answered=false; selectedOptKey=null;
  const q=QUESTIONS[queue[cur]];

  const pct=(cur/queue.length)*100;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`第 ${cur+1} / ${queue.length} 題`;
  document.getElementById('round-badge').textContent=
    round===1?'第一輪':`第 ${round} 輪（錯題回收）`;

  document.getElementById('section-tag').textContent=q.section;

  const gc=document.getElementById('group-context');
  if(q.group_context){ gc.innerHTML=q.group_context; gc.classList.remove('hidden'); }
  else { gc.classList.add('hidden'); }

  let stemHTML=q.stem||'';
  if(q.sub_n) stemHTML=`<span style="color:#2d6a4f;font-weight:700;">第(${q.sub_n})小題　</span>`+stemHTML;
  document.getElementById('question-stem').innerHTML=stemHTML;

  document.getElementById('feedback').style.display='none';
  document.getElementById('feedback').className='';
  document.getElementById('confirm-btn').style.display='none';
  const gb=document.getElementById('guessed-btn');
  gb.style.display='none'; gb.disabled=false;
  gb.textContent='🎲 我是用猜的，加入回收'; gb.classList.remove('marked');
  document.getElementById('next-btn').style.display='none';

  const optsEl=document.getElementById('options');
  optsEl.innerHTML='';
  const opts=q.opts||{};

  if(Object.keys(opts).length===4){
    ['A','B','C','D'].forEach(k=>{
      const btn=document.createElement('button');
      btn.className='opt-btn';
      btn.innerHTML=`<span class="lbl">${k}</span><span>${opts[k]}</span>`;
      btn.onclick=()=>selectOpt(k, btn, null);
      optsEl.appendChild(btn);
    });
  } else {
    const disp=document.createElement('div');
    disp.id='img-opt-display';
    disp.innerHTML=q.full_html||'';
    optsEl.appendChild(disp);
    const grid=document.createElement('div');
    grid.className='abcd-grid';
    ['A','B','C','D'].forEach(k=>{
      const btn=document.createElement('button');
      btn.className='abcd-btn';
      btn.textContent=k;
      btn.onclick=()=>selectOpt(k, null, btn);
      grid.appendChild(btn);
    });
    optsEl.appendChild(grid);
  }
}

function selectOpt(k, optBtn, abcdBtn){
  if(answered) return;
  selectedOptKey=k;
  // clear previous selection highlight
  document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.abcd-btn').forEach(b=>b.classList.remove('selected'));
  if(optBtn) optBtn.classList.add('selected');
  if(abcdBtn) abcdBtn.classList.add('selected');
  document.getElementById('confirm-btn').style.display='block';
}

function confirmAnswer(){
  if(!selectedOptKey || answered) return;
  answered=true;
  const chosen=selectedOptKey;
  const q=QUESTIONS[queue[cur]];
  const correct=q.answer;
  const isOk=(chosen===correct);

  document.getElementById('confirm-btn').style.display='none';

  if(document.querySelectorAll('.opt-btn').length>0){
    document.querySelectorAll('.opt-btn').forEach((b,i)=>{
      const k=['A','B','C','D'][i];
      b.classList.remove('selected');
      if(k===correct) b.classList.add('reveal');
    });
    document.querySelectorAll('.opt-btn')[['A','B','C','D'].indexOf(chosen)]
      .classList.add(isOk?'correct':'wrong');
  } else {
    document.querySelectorAll('.abcd-btn').forEach(b=>{
      b.classList.remove('selected');
      if(b.textContent===correct) b.classList.add('reveal');
      if(b.textContent===chosen) b.classList.add(isOk?'correct':'wrong');
    });
  }

  const fb=document.getElementById('feedback');
  fb.style.display='block';
  if(isOk){
    fb.className='ok'; fb.textContent='✓ 答對了！';
    if(round===1) correct1++;
    document.getElementById('guessed-btn').style.display='block';
  } else {
    fb.className='err'; fb.textContent=`✗ 答錯了，正確答案是 ${correct}`;
    const qid=queue[cur];
    roundWrongIds.add(qid);
    roundWrongAns[qid]=chosen;
    if(!sessionWrongIds.has(qid)) sessionWrongAns[qid]=chosen;
    sessionWrongIds.add(qid);
    totalWrong++;
  }
  document.getElementById('next-btn').style.display='block';
}

function markAsGuessed(){
  const qid=queue[cur];
  roundWrongIds.add(qid);
  roundGuessedIds.add(qid);
  sessionWrongIds.add(qid);
  if(!sessionWrongAns[qid]) sessionWrongAns[qid]='（猜對）';
  const btn=document.getElementById('guessed-btn');
  btn.textContent='🎲 已標記為猜對，加入下輪回收';
  btn.classList.add('marked'); btn.disabled=true;
}

function nextQuestion(){
  cur++;
  if(cur>=queue.length){
    showRoundEnd();
  } else {
    showQ();
  }
}

function showRoundEnd(){
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('round-end-screen').classList.remove('hidden');

  const recycleCount=roundWrongIds.size;
  const guessedCount=roundGuessedIds.size;
  const wrongOnlyCount=recycleCount-guessedCount;
  const correctCount=queue.length-recycleCount;
  const allDone=(recycleCount===0);

  document.getElementById('re-emoji').textContent=allDone?'🎉':'📝';
  document.getElementById('re-title').textContent=allDone?'全部答對了！':`第 ${round} 輪完成`;

  if(allDone){
    document.getElementById('re-desc').textContent=`恭喜完成全部 ${round} 輪練習！`;
  } else {
    const parts=[];
    if(wrongOnlyCount>0) parts.push(`答錯 ${wrongOnlyCount} 題`);
    if(guessedCount>0) parts.push(`猜對 ${guessedCount} 題`);
    document.getElementById('re-desc').textContent=
      `${parts.join('、')}，共 ${recycleCount} 題加入下輪回收。`;
  }

  document.getElementById('re-total').textContent=queue.length;
  document.getElementById('re-correct').textContent=correctCount;
  document.getElementById('re-wrong').textContent=recycleCount;
  document.getElementById('re-wrong-lbl').textContent=
    guessedCount>0?`回收（含 ${guessedCount} 猜）`:'答錯（回收）';
  document.getElementById('re-rounds').textContent=round;

  const nextBtn=document.getElementById('re-next-btn');
  const exportBtn=document.getElementById('re-export-btn');

  if(allDone){
    nextBtn.style.display='none';
    exportBtn.style.display='none';
  } else {
    nextBtn.textContent=`開始第 ${round+1} 輪（${recycleCount} 題）`;
    nextBtn.style.display='block';
    exportBtn.style.display='block';
  }
}

function startNextRound(){
  const ids=[...roundWrongIds];
  round++;
  roundTotal=ids.length;
  roundWrongIds=new Set(); roundGuessedIds=new Set();
  roundWrongAns={};
  queue=ids; shuffle(queue); cur=0;
  document.getElementById('round-end-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  showQ();
}

function exportRoundPDF(){
  // snapshot before round state changes
  const wrongIds=[...roundWrongIds];
  const wrongAns={...roundWrongAns};
  const roundNum=round;
  buildAndPrintPDF(wrongIds, wrongAns, roundNum);
}

function buildAndPrintPDF(wrongIds, wrongAns, roundNum){
  const wrongList=wrongIds.sort((a,b)=>a-b).map(i=>QUESTIONS[i]);
  const now=new Date();
  const dateStr=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;

  // ── 題目區 ──
  let cards=''; let lastSec='';
  wrongList.forEach((q,n)=>{
    if(q.section!==lastSec){
      cards+=`<div class="pq-sec">${q.section}</div>`;
      lastSec=q.section;
    }
    const subLabel=q.sub_n?`第(${q.sub_n})小題　`:'';
    const ctx=q.group_context?`<div class="pq-ctx">${q.group_context}</div>`:'';
    const stem=`<div class="pq-stem">${subLabel}${q.stem||''}</div>`;
    let optsHtml='';
    const opts=q.opts||{};
    if(Object.keys(opts).length===4){
      optsHtml='<div class="pq-opts">';
      ['A','B','C','D'].forEach(k=>{
        optsHtml+=`<div class="pq-opt"><span class="pq-lbl">${k}</span>${opts[k]}</div>`;
      });
      optsHtml+='</div>';
    } else {
      optsHtml=`<div class="pq-full">${q.full_html||''}</div>`;
    }
    cards+=`<div class="pq-card"><div class="pq-num">第 ${n+1} 題</div>${ctx}${stem}${optsHtml}</div>`;
  });

  // ── 答案區（最後一頁）──
  let ansRows='';
  wrongList.forEach((q,n)=>{
    const myAns=wrongAns[q.id]||'─';
    ansRows+=`<tr><td>${n+1}</td><td class="wrong-cell">${myAns}</td><td class="right-cell">${q.answer}</td></tr>`;
  });

  const html=`<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<title>生物錯題 第${roundNum}輪</title>
<style>
  body{font-family:-apple-system,'Noto Sans TC',sans-serif;margin:0;padding:20px;color:#111;}
  h2{color:#2d6a4f;margin-bottom:4px;}
  .sub{color:#888;font-size:.85rem;margin-bottom:24px;}
  .pq-sec{font-weight:700;font-size:.82rem;background:#d8f3dc;color:#2d6a4f;
    padding:3px 12px;border-radius:999px;display:inline-block;margin:20px 0 10px;}
  .pq-card{border:1px solid #ddd;border-radius:12px;padding:16px;margin-bottom:14px;page-break-inside:avoid;}
  .pq-num{font-size:.75rem;color:#999;margin-bottom:6px;}
  .pq-ctx{background:#f6f6f6;border-left:3px solid #52b788;padding:8px 12px;
    border-radius:0 6px 6px 0;margin-bottom:10px;font-size:.9rem;line-height:1.7;}
  .pq-ctx img,.pq-full img{max-width:100%;border-radius:6px;margin:4px 0;display:block;}
  .pq-stem{font-size:.97rem;line-height:1.8;margin-bottom:12px;}
  .pq-stem img{max-width:100%;border-radius:6px;margin:4px 0;display:block;}
  .pq-opts{display:flex;flex-direction:column;gap:6px;}
  .pq-opt{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
    border-radius:8px;border:1px solid #eee;font-size:.9rem;line-height:1.6;}
  .pq-lbl{background:#e8e8e8;border-radius:5px;min-width:24px;height:24px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.82rem;flex-shrink:0;}
  .pq-full{font-size:.9rem;line-height:1.8;}
  /* 答案頁 */
  .ans-page{page-break-before:always;padding-top:20px;}
  .ans-page h3{color:#2d6a4f;margin-bottom:16px;font-size:1.2rem;}
  .ans-table{border-collapse:collapse;width:100%;max-width:360px;font-size:.95rem;}
  .ans-table th,.ans-table td{border:1px solid #ddd;padding:8px 16px;text-align:center;}
  .ans-table th{background:#d8f3dc;color:#1b4332;font-weight:700;}
  .wrong-cell{color:#c1121f;font-weight:700;}
  .right-cell{color:#2d6a4f;font-weight:700;}
  @media print{body{padding:0;}@page{margin:1.5cm;}}
</style></head><body>
<h2>生物錯題整理 · 第 ${roundNum} 輪</h2>
<div class="sub">練習日期：${dateStr}　本輪答錯 ${wrongList.length} 題</div>
${cards}
<div class="ans-page">
  <h3>答案</h3>
  <table class="ans-table">
    <thead><tr><th>題號</th><th>你的答案</th><th>正確答案</th></tr></thead>
    <tbody>${ansRows}</tbody>
  </table>
</div>
</body></html>`;

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`生物錯題_第${roundNum}輪.html`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

function restartQuiz(){
  localStorage.removeItem(SAVE_KEY);
  document.getElementById('save-btn').classList.add('hidden');
  document.getElementById('round-end-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
}
</script>
</body>
</html>
